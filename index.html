<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Halftone Dot Visualizer</title>
    <link rel="stylesheet" href="styles.css?v=2026-05-13-1" />
  </head>
  <body>
    <main class="app-shell">
      <section class="visualizer" aria-label="Halftone dot preview">
        <canvas id="halftoneCanvas"></canvas>
      </section>

      <section class="lpi-row" aria-label="Halftone screen frequency">
        <div class="lpi-control">
          <label class="lpi-label" for="lpiSlider">LPI</label>
          <input
            id="lpiSlider"
            class="lpi-slider"
            type="range"
            min="25"
            max="200"
            step="1"
            value="25"
          />
          <span id="lpiValue" class="lpi-value">25</span>
        </div>
        <div class="lpi-row-right" aria-hidden="true"></div>
      </section>

      <section
        class="control-strip"
        id="controlStrip"
        data-mode="single"
        aria-label="Halftone controls"
      >
        <div class="title-group">
          <p class="eyebrow">Printed halftone</p>
          <h1 id="modeTitle">Dot coverage</h1>

          <div class="mode-toggle" role="group" aria-label="Color mode">
            <button
              class="mode-button is-active"
              type="button"
              data-mode="single"
              aria-pressed="true"
            >
              K
            </button>
            <button
              class="mode-button"
              type="button"
              data-mode="cmyk"
              aria-pressed="false"
            >
              CMYK
            </button>
          </div>
        </div>

        <div class="meter" id="singleMeter" aria-live="polite">
          <span id="coverageValue">50</span><span>%</span>
        </div>

        <div class="controls-panel">
          <div class="single-controls" id="singleControls">
            <label class="slider-control" for="coverageSlider">
              <span>Ink</span>
              <input
                id="coverageSlider"
                type="range"
                min="0"
                max="100"
                value="50"
                step="1"
              />
            </label>
          </div>

          <div class="cmyk-controls" id="cmykControls" hidden>
            <label class="channel-control channel-cyan" for="cyanSlider">
              <span>C</span>
              <output id="cyanValue" for="cyanSlider">50%</output>
              <input
                id="cyanSlider"
                data-channel="c"
                type="range"
                min="0"
                max="100"
                value="50"
                step="1"
              />
            </label>

            <label class="channel-control channel-magenta" for="magentaSlider">
              <span>M</span>
              <output id="magentaValue" for="magentaSlider">50%</output>
              <input
                id="magentaSlider"
                data-channel="m"
                type="range"
                min="0"
                max="100"
                value="50"
                step="1"
              />
            </label>

            <label class="channel-control channel-yellow" for="yellowSlider">
              <span>Y</span>
              <output id="yellowValue" for="yellowSlider">50%</output>
              <input
                id="yellowSlider"
                data-channel="y"
                type="range"
                min="0"
                max="100"
                value="50"
                step="1"
              />
            </label>

            <label class="channel-control channel-black" for="blackSlider">
              <span>K</span>
              <output id="blackValue" for="blackSlider">50%</output>
              <input
                id="blackSlider"
                data-channel="k"
                type="range"
                min="0"
                max="100"
                value="50"
                step="1"
              />
            </label>
          </div>

          <div class="dot-gain-controls">
            <button
              id="dotGainTrigger"
              class="dot-gain-trigger"
              type="button"
              aria-expanded="false"
              aria-controls="dotGainPopover"
            >
              Dot Gain Settings
            </button>
            <div id="dotGainPopover" class="dot-gain-popover" hidden>
              <label class="dot-gain-input" for="dotGainInput">
                <span>Dot Gain</span>
                <span class="input-row">
                  <input id="dotGainInput" type="number" min="0" max="40" step="1" value="18" />
                  <span class="suffix">%</span>
                </span>
              </label>
              <label class="dot-gain-input" for="minDotInput">
                <span>Min Dot</span>
                <span class="input-row">
                  <input id="minDotInput" type="number" min="0" max="15" step="0.5" value="1" />
                  <span class="suffix">%</span>
                </span>
              </label>
              <label class="dot-gain-input" for="minDotPrintedInput">
                <span>Min Dot Printed</span>
                <span class="input-row">
                  <input id="minDotPrintedInput" type="number" min="0" max="25" step="0.5" value="3" />
                  <span class="suffix">%</span>
                </span>
              </label>
              <button
                id="dotGainApplyButton"
                class="dot-gain-apply"
                type="button"
                disabled
              >
                Apply
              </button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="app.js?v=2026-05-13-1"></script>
  </body>
</html>
